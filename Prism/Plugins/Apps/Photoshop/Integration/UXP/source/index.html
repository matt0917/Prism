<!DOCTYPE html>
<html>
<head>
    <title>Prism</title>
    <link rel="stylesheet" href="styles.css">
    <script src="index.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="icons/prism@1x.png" alt="Prism" class="header-icon">
            <h2>Prism Pipeline</h2>
        </div>
        <div class="buttons">
            <button id="saveVersionBtn" class="primary-button">Save Version</button>
            <button id="saveExtendedBtn" class="primary-button">Save Extended</button>
            <button id="exportBtn" class="primary-button">Export</button>
            <button id="projectBrowserBtn" class="primary-button">Project Browser</button>
            <button id="settingsBtn" class="primary-button">Settings</button>
        </div>
    </div>
</body>
</html>
