name: Build Prism Installer and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Show repository contents
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Force

      - name: Prepare build folder
        run: |
          New-Item -ItemType Directory -Force -Path "build\Prism"
          Copy-Item -Path "Prism\*" -Destination "build\Prism" -Recurse -Force

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build installer
        run: |
          iscc installer\PrismInstaller.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Prism v1.0.${{ github.run_number }}
          body: |
            Auto release from main branch.
            Commit: ${{ github.sha }}
          files: dist/PrismInstaller.exe
