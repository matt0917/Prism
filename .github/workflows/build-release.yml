name: Build Prism Installer and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prepare build folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "build\Prism"
          Copy-Item -Path "Prism\*" -Destination "build\Prism" -Recurse -Force

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          iscc installer\PrismInstaller.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Prism ${{ github.ref_name }}
          body: |
            Official Prism release.
            Commit: ${{ github.sha }}
          files: dist/PrismInstaller.exe